<app-expansion-panel title="filters" #filters>
  <form [formGroup]="form" class="d-flex flex-wrap" style="gap: 16px" #filters>
    <app-input formControlName="id" label="id" class="col" />

    <app-input formControlName="name" label="name" class="col" />
  </form>
</app-expansion-panel>

<app-table
  [height]="tableHeight"
  [columns]="columns"
  [displayedColumns]="displayedColumns"
  [dataSource]="data"
  [total]="total"
  (loadMore)="scroll()"
  (sort)="sort($event)"
>
  <ng-template #actionsColumn>
    <div style="display: flex; justify-content: center; width: 100%">
      <a routerLink="./add">
        <app-icon-button icon="add_circle" tooltip="add" />
      </a>
    </div>
  </ng-template>
  <ng-template #actionsRow let-element="element">
    <div style="display: flex; justify-content: center; width: 100%">
      <a [routerLink]="['./', element.id]">
        <app-icon-button icon="edit_square" tooltip="edit" />
      </a>
      <app-icon-button
        icon="delete"
        tooltip="delete"
        (click)="openDialog(element)"
      />
    </div>
  </ng-template>
</app-table>
