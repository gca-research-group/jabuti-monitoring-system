@if (!isLoading()) {
<button
  mat-icon-button
  type="button"
  [matTooltipPosition]="tooltipPosition()"
  [matTooltip]="tooltip() | translate"
  matTooltipPosition="right"
  [attr.aria-label]="ariaLabel()"
  [disabled]="disabled()"
>
  <app-icon [icon]="icon()" [svg]="svg()" [img]="img()" [color]="color()" />
</button>
} @else {
  <app-spinner [size]="20" />
}
