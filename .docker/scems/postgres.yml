services:
  scems_postgres:
    container_name: scems_postgres
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    user: postgres
    volumes:
      - scems_postgres_volume:/var/lib/postgresql/data
    env_file:
      - envs/.env.postgres
    networks:
      - scems_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "scemsdb"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
    mem_limit: 2g
    mem_reservation: 1g
    cpus: "2"

  scems_pgbouncer:
    container_name: scems_pgbouncer
    image: edoburu/pgbouncer:1.22.1-p0
    depends_on:
      scems_postgres:
        condition: service_healthy
    ports:
      - "6432:6432"
    volumes:
      - ./config/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
    env_file:
      - envs/.env.pgbouncer
    networks:
      - scems_network
    restart: unless-stopped

  scems_postgres_exporter:
    container_name: scems_postgres_exporter
    image: quay.io/prometheuscommunity/postgres-exporter
    depends_on:
      scems_postgres:
        condition: service_healthy
    ports:
      - "9187:9187"
    env_file:
      - envs/.env.postgres_exporter
    networks:
      - scems_network
    restart: unless-stopped

volumes:
  scems_postgres_volume:
    name: scems_postgres_volume
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/postgres/data
