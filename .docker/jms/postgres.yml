services:
  jms_postgres:
    container_name: jms_postgres
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    user: postgres
    volumes:
      - jms_postgres_volume:/var/lib/postgresql/data
    env_file:
      - envs/.env.postgres
    networks:
      - jms_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "jmsdb"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
    mem_limit: 2g
    mem_reservation: 1g
    cpus: "2"

