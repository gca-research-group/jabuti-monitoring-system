services:

  api:
    image: eclipse-temurin:21-jre
    container_name: api
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./volumes/api/api.jar:/app/api.jar:ro
    command: [
        "java",
        "-XX:+UseContainerSupport",
        "-XX:MaxRAMPercentage=75.0",
        "-jar",
        "api.jar",
        "--spring.profiles.active=prod"]
    ports:
      - "8080:8080"
    env_file:
      - envs/.env.api
    networks:
      - jms_network
